<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verbos irregulares</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Verbos irregulares</h1>
      <p class="subtitle">Te damos una forma; completá las otras dos.</p>
    </header>

    <section class="scoreboard" aria-live="polite">
      <span>Racha: <strong id="streak">0</strong></span>
      <span>Aciertos: <strong id="correct">0</strong> / <strong id="total">0</strong></span>
    </section>

    <form id="game-form" class="card" novalidate>
      <div class="field" data-form="present">
        <label for="present">Presente</label>
        <input id="present" name="present" type="text" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field" data-form="past">
        <label for="past">Pasado</label>
        <input id="past" name="past" type="text" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field" data-form="participle">
        <label for="participle">Participio</label>
        <input id="participle" name="participle" type="text" autocomplete="off" spellcheck="false" />
      </div>

      <p id="feedback" class="feedback" role="status" hidden></p>

      <div class="actions">
        <button type="button" id="btn-try" class="btn primary">Jugar</button>
        <button type="submit" id="btn-check" class="btn" hidden>Comprobar</button>
        <button type="button" id="btn-skip" class="btn ghost" hidden>Saltar</button>
        <button type="button" id="btn-reveal" class="btn ghost" hidden>Ver respuesta</button>
      </div>
    </form>

    <p id="load-error" class="error" hidden>
      No se pudo cargar <code>verbs.json</code>. Abrí la carpeta con un servidor local
      (<code>python3 -m http.server</code> o Live Server).
    </p>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
